# Cloudflare Pages Deployment Configuration
# This file tells Cloudflare Pages how to build your project

# Build settings
[build]
  command = "npm run build"
  publish = "dist"

# Environment variables (public only - no secrets here!)
[build.environment]
  NODE_VERSION = "20"

# Redirects and headers
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.openstreetmap.org; connect-src 'self' https://*.geotab.com; frame-ancestors https://*.geotab.com;"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
